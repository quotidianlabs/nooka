name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'        # stable: 1.0.0
      - '[0-9]+.[0-9]+.[0-9]+-*'      # pre-release: 1.0.0-beta.1, 1.0.0-rc.2

# Needed for softprops/action-gh-release to create the release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      # Tag core X.Y.Z (ignoring any -prerelease suffix) must match
      # pubspec.yaml `version: X.Y.Z+N`. pubspec carries no -pre suffix.
      - name: Verify tag matches pubspec version
        run: |
          set -euo pipefail
          core="${GITHUB_REF_NAME%%-*}"
          pubspec="$(grep -E '^version:' pubspec.yaml \
            | sed -E 's/^version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          echo "tag=$GITHUB_REF_NAME core=$core pubspec=$pubspec"
          if [ "$core" != "$pubspec" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (core $core) does not match pubspec version $pubspec"
            exit 1
          fi

      # Reconstruct the signing keystore from secrets (see docs/release.md).
      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty or missing"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          if [ ! -s android/upload-keystore.jks ]; then
            echo "::error::Decoded keystore is empty — refusing to debug-sign"
            exit 1
          fi

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          {
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks"
          } > android/key.properties

      - run: flutter pub get

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          set -euo pipefail
          mv build/app/outputs/flutter-apk/app-release.apk \
             "build/app/outputs/flutter-apk/nooka-${GITHUB_REF_NAME}.apk"

      # Notes: tag -> planning/releases/<tag>.md (omit body_path if absent).
      # Pre-release: any tag with a "-suffix" (e.g. 1.0.0-beta.1) is flagged so
      # GitHub does not mark it "Latest".
      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          notes="planning/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$notes" ]; then
            echo "body_path=$notes" >> "$GITHUB_OUTPUT"
          fi
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/app/outputs/flutter-apk/nooka-${{ github.ref_name }}.apk
          body_path: ${{ steps.meta.outputs.body_path }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          draft: false
