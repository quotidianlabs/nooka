name: main

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - run: just install lint-ci

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage
      - name: Install coverde
        run: dart pub global activate coverde 0.4.0
      - name: Filter generated + glue, enforce 100% threshold
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          coverde transform --input coverage/lcov.info --output coverage/lcov.info --mode w --transformations preset=exclude-untestable
          # Gates at 100%; on a drop, coverde logs the uncovered lines + content
          # (a per-file PR comment would be redundant under a hard 100% gate).
          coverde check --input coverage/lcov.info 100

  # Runs the critical-flow integration test on a KVM-accelerated Android
  # emulator (standard ubuntu runners gained KVM in 2024). Only this file —
  # screenshots_test.dart is a screenshot generator, not a pass/fail test.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      # The api-34 AVD needs ~7.4 GB for its userdata partition; the hosted
      # runner can drop below that as the Gradle/system-image caches grow,
      # making the emulator FATAL-exit at boot ("Not enough space to create
      # userdata partition" → never registers with adb → "boot timeout").
      # Reclaim a few GB of preinstalled tooling the Flutter/Android build
      # never uses, before the emulator step. (Preventive — see habbits CI.)
      - name: Free disk space for the emulator
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: flutter pub get
      # The Gradle build (assembleDebug) dominates this job (~5.5 min cold), so
      # cache Gradle deps + build cache and the emulator system image. AVD
      # snapshot caching is intentionally omitted: it only shortens the 39s cold
      # boot and carries snapshot-corruption/hang gotchas — not worth it here.
      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: gradle-
      - name: Resolve system-image path
        run: echo "ANDROID_SYSIMG=$ANDROID_SDK_ROOT/system-images/android-34/google_apis/x86_64" >> "$GITHUB_ENV"
      - name: System-image cache
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SYSIMG }}
          key: sysimg-android-34-google_apis-x86_64
      - name: Run integration tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: flutter test integration_test/critical_flow_test.dart integration_test/backup_round_trip_test.dart
