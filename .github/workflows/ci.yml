name: main

on:
  push:
    branches: [main]
  pull_request: {}

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - run: just install lint-ci

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # post the coverage comment on PRs
    steps:
      - uses: actions/checkout@v5
      - uses: extractions/setup-just@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Run tests with coverage
        run: flutter test --coverage
      # Filters generated files out of lcov AND writes the job summary.
      - name: Filter + summarize coverage
        run: python3 tool/coverage.py | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Enforce coverage threshold
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: coverage/lcov.info
          min_coverage: 85
      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          lcov-file: coverage/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Runs the critical-flow integration test on a KVM-accelerated Android
  # emulator (standard ubuntu runners gained KVM in 2024). Only this file —
  # screenshots_test.dart is a screenshot generator, not a pass/fail test.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: flutter pub get
      # The Gradle build (assembleDebug) dominates this job (~5.5 min cold), so
      # cache Gradle deps + build cache and the emulator system image. AVD
      # snapshot caching is intentionally omitted: it only shortens the 39s cold
      # boot and carries snapshot-corruption/hang gotchas — not worth it here.
      - name: Gradle cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'pubspec.lock') }}
          restore-keys: gradle-
      - name: Resolve system-image path
        run: echo "ANDROID_SYSIMG=$ANDROID_SDK_ROOT/system-images/android-34/google_apis/x86_64" >> "$GITHUB_ENV"
      - name: System-image cache
        uses: actions/cache@v5
        with:
          path: ${{ env.ANDROID_SYSIMG }}
          key: sysimg-android-34-google_apis-x86_64
      - name: Run critical-flow integration test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: flutter test integration_test/critical_flow_test.dart
